name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:web

      - name: Build Electron (NSIS + portable)
        run: npx electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder

      - name: Zip portable exe
        shell: pwsh
        run: |
          $portable = Get-ChildItem dist-electron -Filter "*.exe" |
            Where-Object { $_.Name -notlike "*Setup*" -and $_.Name -notlike "*.blockmap*" } |
            Select-Object -First 1
          if ($portable) {
            Compress-Archive -Path $portable.FullName -DestinationPath "dist-electron/BitHoard-portable.zip"
            Write-Host "Created dist-electron/BitHoard-portable.zip"
          } else {
            Write-Host "No portable exe found!"
            exit 1
          }

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist-electron/*Setup*.exe
            dist-electron/*Setup*.exe.blockmap
            dist-electron/BitHoard-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
